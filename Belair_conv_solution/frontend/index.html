<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Belair Direct — Car Insurance Quote</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:    #C8102E;
      --blue:   #002F6C;
      --bg:     #F4F5F7;
      --white:  #FFFFFF;
      --border: #D9DCE1;
      --text:   #1A1A2E;
      --muted:  #6B7280;
      --green:  #16A34A;
      --locked: #E5E7EB;
      --shadow: 0 2px 8px rgba(0,0,0,.08);
      --radius: 10px;
    }
    html, body { height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      background: var(--blue);
      color: var(--white);
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 700; letter-spacing: .3px; }
    .logo-dot { width: 12px; height: 12px; background: var(--red); border-radius: 50%; }
    .header-badge { font-size: .75rem; background: rgba(255,255,255,.15); padding: 3px 10px; border-radius: 20px; }

    /* ── Main layout ─────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 0;
      height: calc(100vh - 56px);
      overflow: hidden;
    }

    /* ── Form panel ──────────────────────────────────────────── */
    #form-panel {
      overflow-y: auto;
      padding: 28px 32px;
      border-right: 1px solid var(--border);
    }
    .form-title { font-size: 1.4rem; font-weight: 700; color: var(--blue); margin-bottom: 6px; }
    .form-subtitle { font-size: .88rem; color: var(--muted); margin-bottom: 24px; }

    /* Step card */
    .step-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
      transition: box-shadow .2s;
    }
    .step-card.active { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,47,108,.1); }
    .step-card.locked { opacity: .55; pointer-events: none; }

    .step-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
      background: var(--white);
    }
    .step-header:hover { background: #F8F9FB; }
    .step-number {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700;
      flex-shrink: 0;
    }
    .step-card.completed .step-number { background: var(--green); color: white; }
    .step-card.active    .step-number { background: var(--blue);  color: white; }
    .step-card.locked    .step-number { background: var(--locked); color: var(--muted); }
    .step-name { font-weight: 600; font-size: .95rem; flex: 1; }
    .step-status { font-size: .78rem; color: var(--muted); }
    .step-card.completed .step-status { color: var(--green); }

    .step-body { padding: 4px 20px 20px; border-top: 1px solid var(--border); }

    /* Form fields */
    .field-group { margin-top: 16px; }
    .field-label {
      display: flex; align-items: center; gap: 6px;
      font-size: .82rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px;
    }
    .field-answered { color: var(--blue); }
    .field-value {
      font-size: .95rem; font-weight: 500; color: var(--text);
      padding: 8px 12px;
      background: #F0F4FF;
      border: 1px solid #C7D4F0;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .field-value:hover { border-color: var(--blue); }
    .field-value.empty { color: var(--muted); background: var(--bg); border-color: var(--border); font-style: italic; }
    .field-active-indicator {
      display: inline-block; width: 7px; height: 7px;
      background: var(--red); border-radius: 50%; margin-left: 6px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Chat panel ──────────────────────────────────────────── */
    #chat-panel {
      display: flex;
      flex-direction: column;
      background: var(--white);
    }
    .chat-header {
      padding: 14px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .chat-avatar {
      width: 36px; height: 36px;
      background: var(--red);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1rem;
    }
    .chat-agent-name { font-weight: 700; font-size: .95rem; }
    .chat-agent-desc { font-size: .78rem; color: var(--muted); }
    .online-dot { width: 8px; height: 8px; background: #22C55E; border-radius: 50%; margin-left: auto; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg { display: flex; gap: 8px; max-width: 100%; }
    .msg.user { flex-direction: row-reverse; }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: .9rem;
      line-height: 1.5;
      max-width: 82%;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.assistant .msg-bubble { background: var(--bg); border-bottom-left-radius: 4px; }
    .msg.user      .msg-bubble { background: var(--blue); color: white; border-bottom-right-radius: 4px; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; flex-shrink: 0; align-self: flex-end;
    }
    .msg.assistant .msg-avatar { background: var(--red); color: white; }
    .msg.user      .msg-avatar { background: var(--blue); color: white; }

    /* Typing indicator */
    .typing-bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
    .typing-bubble span {
      width: 7px; height: 7px; background: var(--muted); border-radius: 50%;
      animation: bounce .9s ease-in-out infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .15s; }
    .typing-bubble span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* Chat input */
    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #chat-input {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      max-height: 100px;
      line-height: 1.4;
      transition: border-color .2s;
    }
    #chat-input:focus { border-color: var(--blue); }
    #send-btn {
      width: 40px; height: 40px;
      background: var(--blue);
      border: none; border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; flex-shrink: 0;
      transition: background .2s, transform .1s;
    }
    #send-btn:hover { background: #001f4d; }
    #send-btn:active { transform: scale(.93); }
    #send-btn:disabled { background: var(--border); cursor: default; }
    #send-btn svg { width: 18px; height: 18px; }

    /* Connection banner */
    #status-bar {
      text-align: center;
      padding: 5px;
      font-size: .78rem;
      display: none;
    }
    #status-bar.connecting { display: block; background: #FEF3C7; color: #92400E; }
    #status-bar.error      { display: block; background: #FEE2E2; color: #991B1B; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    belairdirect
  </div>
  <span class="header-badge">Car Insurance Quote · Quebec · 1 car / 1 driver</span>
</header>

<div class="app">

  <!-- ═══════════════ FORM PANEL ═══════════════ -->
  <div id="form-panel">
    <div class="form-title">Your Insurance Quote</div>
    <div class="form-subtitle">Your answers are saved automatically. Chat with the assistant on the right for help.</div>
    <div id="steps-container">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- ═══════════════ CHAT PANEL ═══════════════ -->
  <div id="chat-panel">
    <div class="chat-header">
      <div class="chat-avatar">B</div>
      <div>
        <div class="chat-agent-name">Belair Assistant</div>
        <div class="chat-agent-desc">Here to guide your quote</div>
      </div>
      <div class="online-dot" id="online-dot" title="Connected"></div>
    </div>
    <div id="status-bar" class="connecting">Connecting…</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <textarea id="chat-input" rows="1" placeholder="Type your answer or question…" disabled></textarea>
      <button id="send-btn" disabled title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════
const SCHEMA_STEPS = [
  {
    step: 1, title: "Vehicle Information",
    questions: [
      { id: "vehicle_year",  label: "Year",  type: "text" },
      { id: "vehicle_make",  label: "Make",  type: "text" },
      { id: "vehicle_model", label: "Model", type: "text" },
    ]
  },
  {
    step: 2, title: "Vehicle Details",
    questions: [
      { id: "commute_to_work_school", label: "Commute to work/school?",       type: "radio", options: ["No","Yes"] },
      { id: "yearly_kilometres",      label: "Yearly kilometres",              type: "text" },
      { id: "car_condition",          label: "Car condition when acquired",    type: "radio", options: ["New","Used","Demo"] },
      { id: "anti_theft_system",      label: "Anti-theft system?",             type: "radio", options: ["No","Yes"] },
    ]
  },
  {
    step: 3, title: "Driver Information",
    questions: [
      { id: "first_name",       label: "First name",                   type: "text" },
      { id: "last_name",        label: "Last name",                    type: "text" },
      { id: "gender_identity",  label: "Gender identity",              type: "radio", options: ["Male","Female","X"] },
      { id: "date_of_birth",    label: "Date of birth",                type: "text" },
      { id: "age_first_licence",label: "Age at first driver's licence",type: "text" },
    ]
  },
  {
    step: 4, title: "Quote & Confirmation",
    questions: [
      { id: "accidents_tickets",    label: "Accidents / tickets",          type: "radio", options: ["None","Yes"] },
      { id: "lapse_in_coverage",    label: "Lapse in coverage?",           type: "radio", options: ["No","Yes"] },
      { id: "education_discount",   label: "University degree?",           type: "radio", options: ["No","Yes"] },
      { id: "soft_credit_check",    label: "Consent to soft credit check?",type: "radio", options: ["No","Yes"] },
      { id: "email",                label: "Email address",                type: "text" },
      { id: "business_use",         label: "Business use?",                type: "radio", options: ["No","Yes"] },
      { id: "safe_driving_program", label: "Enroll in safe driving program?",type: "radio", options: ["No","Yes"] },
      { id: "home_insurance_bundle",label: "Add home insurance bundle?",   type: "radio", options: ["No","Yes"] },
    ]
  },
];

let state = {
  sessionId: null,
  ws: null,
  formState: { answers: {}, current_step: 1, current_field_idx: 0 },
  isTyping: false,
};

// ═══════════════════════════════════════════════════════════
//  Session management
// ═══════════════════════════════════════════════════════════
async function initSession() {
  let sid = localStorage.getItem("belair_session_id");
  if (sid) {
    // Verify session exists on server
    const res = await fetch(`/api/state/${sid}`);
    if (!res.ok) sid = null;
  }
  if (!sid) {
    const res = await fetch("/api/session/new");
    const data = await res.json();
    sid = data.session_id;
    localStorage.setItem("belair_session_id", sid);
  }
  state.sessionId = sid;
  connectWS();
}

// ═══════════════════════════════════════════════════════════
//  WebSocket
// ═══════════════════════════════════════════════════════════
function connectWS() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws/${state.sessionId}`);
  state.ws = ws;
  setStatus("connecting");

  ws.onopen = () => {
    setStatus("ok");
    setInputEnabled(false); // wait for agent greeting
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    hideTyping();

    if (data.type === "init" || data.type === "message") {
      appendMessage("assistant", data.message.content);
      if (data.form_state) updateFormState(data.form_state);
      setInputEnabled(true);
    } else if (data.type === "state") {
      if (data.form_state) updateFormState(data.form_state);
    } else if (data.type === "error") {
      appendMessage("assistant", `⚠️ ${data.detail}`);
      setInputEnabled(true);
    }
  };

  ws.onerror = () => setStatus("error");
  ws.onclose = () => {
    setStatus("error");
    setInputEnabled(false);
    setTimeout(connectWS, 3000);
  };
}

function send(type, payload) {
  if (state.ws && state.ws.readyState === WebSocket.OPEN) {
    state.ws.send(JSON.stringify({ type, ...payload }));
  }
}

// ═══════════════════════════════════════════════════════════
//  Form state & rendering
// ═══════════════════════════════════════════════════════════
function updateFormState(fs) {
  state.formState = fs;
  renderForm();
}

function renderForm() {
  const { answers, current_step } = state.formState;
  const container = document.getElementById("steps-container");
  container.innerHTML = "";

  SCHEMA_STEPS.forEach((stepDef) => {
    const sNum = stepDef.step;
    const answered = stepDef.questions.filter(q => answers[q.id]);
    const total    = stepDef.questions.length;
    const complete = answered.length === total;
    const active   = sNum === current_step;
    const locked   = sNum > current_step && !complete;

    const card = document.createElement("div");
    card.className = `step-card ${complete ? "completed" : active ? "active" : locked ? "locked" : ""}`;

    // Header
    const hdr = document.createElement("div");
    hdr.className = "step-header";
    hdr.innerHTML = `
      <div class="step-number">${complete ? "✓" : sNum}</div>
      <div class="step-name">${stepDef.title}</div>
      <div class="step-status">${complete ? "Complete" : active ? `${answered.length}/${total}` : "Locked"}</div>
    `;
    // Toggle body on click (for completed steps)
    let bodyVisible = active || complete;
    const body = document.createElement("div");
    body.className = "step-body";
    body.style.display = bodyVisible ? "block" : "none";

    hdr.addEventListener("click", () => {
      if (locked) return;
      bodyVisible = !bodyVisible;
      body.style.display = bodyVisible ? "block" : "none";
    });

    // Questions
    stepDef.questions.forEach((q, qi) => {
      const isCurrentQ = active && !answers[q.id] &&
        stepDef.questions.slice(0, qi).every(prev => answers[prev.id]);
      const group = document.createElement("div");
      group.className = "field-group";

      const labelEl = document.createElement("div");
      labelEl.className = `field-label ${answers[q.id] ? "field-answered" : ""}`;
      labelEl.innerHTML = `${q.label}${isCurrentQ ? '<span class="field-active-indicator"></span>' : ""}`;

      const valueEl = document.createElement("div");
      valueEl.className = `field-value ${answers[q.id] ? "" : "empty"}`;
      valueEl.textContent = answers[q.id] || "—";
      valueEl.title = "Click to edit via chat";

      // Click to focus chat on this field
      valueEl.addEventListener("click", () => {
        const chatInput = document.getElementById("chat-input");
        chatInput.value = `I want to change my answer for "${q.label}"`;
        chatInput.focus();
      });

      group.append(labelEl, valueEl);
      body.appendChild(group);
    });

    card.append(hdr, body);
    container.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════
//  Chat rendering
// ═══════════════════════════════════════════════════════════
function appendMessage(role, content) {
  const msgs = document.getElementById("chat-messages");
  const wrap = document.createElement("div");
  wrap.className = `msg ${role}`;

  const avatar = document.createElement("div");
  avatar.className = "msg-avatar";
  avatar.textContent = role === "assistant" ? "B" : "Me";

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.textContent = content;

  wrap.append(avatar, bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  if (state.isTyping) return;
  state.isTyping = true;
  const msgs = document.getElementById("chat-messages");
  const wrap = document.createElement("div");
  wrap.className = "msg assistant";
  wrap.id = "typing-indicator";

  const avatar = document.createElement("div");
  avatar.className = "msg-avatar";
  avatar.textContent = "B";

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.innerHTML = '<div class="typing-bubble"><span></span><span></span><span></span></div>';

  wrap.append(avatar, bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
  state.isTyping = false;
}

// ═══════════════════════════════════════════════════════════
//  Input handling
// ═══════════════════════════════════════════════════════════
function setInputEnabled(enabled) {
  document.getElementById("chat-input").disabled = !enabled;
  document.getElementById("send-btn").disabled   = !enabled;
}

function setStatus(s) {
  const bar = document.getElementById("status-bar");
  const dot = document.getElementById("online-dot");
  if (s === "ok") {
    bar.className = ""; bar.style.display = "none";
    dot.style.background = "#22C55E";
  } else if (s === "connecting") {
    bar.className = "connecting"; bar.textContent = "Connecting…";
    dot.style.background = "#F59E0B";
  } else {
    bar.className = "error"; bar.textContent = "Disconnected — reconnecting…";
    dot.style.background = "#EF4444";
  }
}

function submitMessage() {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text) return;

  appendMessage("user", text);
  send("message", { content: text });
  showTyping();
  setInputEnabled(false);

  input.value = "";
  input.style.height = "auto";
}

// ═══════════════════════════════════════════════════════════
//  Event listeners
// ═══════════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
  renderForm(); // render empty shell

  const input = document.getElementById("chat-input");
  const btn   = document.getElementById("send-btn");

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!btn.disabled) submitMessage();
    }
  });

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 100) + "px";
  });

  btn.addEventListener("click", submitMessage);

  initSession();
});
</script>
</body>
</html>
