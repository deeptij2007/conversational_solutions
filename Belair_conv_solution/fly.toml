app = "belair-quote"
primary_region = "yyz"   # Toronto — closest to Belair Direct's market

[build]

[env]
  DB_PATH = "/data/belair.db"

[[mounts]]
  source = "belair_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/api/session/new"
    timeout = "10s"

[[vm]]
  memory = "2048mb"
  cpu_kind = "shared"
  cpus = 1
